# BVR Core Contract: artifact.yaml
# Defines artifact metadata & structure

schema: bvr.contract.artifact.v1

fields:
  id:
    type: string
    required: true
    description: "Unique artifact identifier"

  name:
    type: string
    required: true
    description: "Human-readable name"

  type:
    type: string
    required: true
    enum: [report, design_doc, decision_record, analysis, summary, code, configuration]

  format:
    type: string
    enum: [markdown, pdf, json, yaml, html, docx]
    default: markdown

  workflow_id:
    type: string
    required: true
    description: "Source workflow"

  execution_id:
    type: string
    required: true
    description: "Source execution"

  storage:
    type: object
    fields:
      bucket: { type: string, required: true }
      key: { type: string, required: true }
      version: { type: string }
    description: "Object storage location"

  metadata:
    type: object
    fields:
      created_at: { type: string, format: date-time }
      created_by: { type: string }
      tags: { type: array, items: string }
      classification: { type: string, enum: [public, internal, confidential, restricted] }
    description: "Artifact metadata"
