# Phase 1: Vault in dev mode — ephemeral, single-node, no unsealing required.
# Phase 2: replace with server mode (init + unseal + KV v2) using vault.hcl.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vault
  namespace: bvr-nexus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vault
  template:
    metadata:
      labels:
        app: vault
    spec:
      containers:
        - name: vault
          image: hashicorp/vault:1.17.0
          args: ["server", "-dev"]
          ports:
            - containerPort: 8200
          env:
            - name: VAULT_DEV_ROOT_TOKEN_ID
              valueFrom:
                secretKeyRef:
                  name: bvr-nexus-secrets
                  key: VAULT_TOKEN
            - name: VAULT_DEV_LISTEN_ADDRESS
              value: "0.0.0.0:8200"
            - name: VAULT_ADDR
              value: "http://0.0.0.0:8200"
          securityContext:
            capabilities:
              add: ["IPC_LOCK"]
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /v1/sys/health
              port: 8200
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /v1/sys/health
              port: 8200
            initialDelaySeconds: 20
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: vault
  namespace: bvr-nexus
spec:
  selector:
    app: vault
  ports:
    - port: 8200
      targetPort: 8200
