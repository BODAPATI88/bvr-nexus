apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-gateway
  namespace: bvr-nexus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-gateway
  template:
    metadata:
      labels:
        app: ai-gateway
    spec:
      containers:
        - name: ai-gateway
          image: bodapati88/bvr-ai-gateway:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: bvr-nexus-secrets
                  key: POSTGRES_PASSWORD
            - name: DATABASE_URL
              value: "postgresql+asyncpg://bvr:$(POSTGRES_PASSWORD)@postgres:5432/bvr_nexus"
            - name: REDIS_URL
              value: "redis://redis:6379"
            - name: BVR_CONSTITUTION
              value: "/app/contracts/constitution.yaml"
            - name: BVR_PLUGINS_DIR
              value: "/app/plugins"
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: bvr-nexus-secrets
                  key: ANTHROPIC_API_KEY
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: bvr-nexus-secrets
                  key: OPENAI_API_KEY
            - name: KIMI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: bvr-nexus-secrets
                  key: KIMI_API_KEY
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 40
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: ai-gateway
  namespace: bvr-nexus
spec:
  selector:
    app: ai-gateway
  ports:
    - port: 8000
      targetPort: 8000
