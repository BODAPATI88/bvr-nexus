apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ingress-ops
  namespace: bvr-nexus
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
    traefik.ingress.kubernetes.io/router.tls.certresolver: le
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - ops.bvrinfra.in
        - ceo.bvrinfra.in
  rules:
    - host: ops.bvrinfra.in
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ops-console
                port:
                  number: 8002
    - host: ceo.bvrinfra.in
      http:
        paths:
          - path: /ceo
            pathType: Prefix
            backend:
              service:
                name: ops-console
                port:
                  number: 8002
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ops-console
                port:
                  number: 8002
