apiVersion: apps/v1
kind: Deployment
metadata:
  name: keycloak
  namespace: bvr-nexus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: keycloak
  template:
    metadata:
      labels:
        app: keycloak
    spec:
      initContainers:
        - name: wait-for-postgres
          image: pgvector/pgvector:pg16
          env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: bvr-nexus-secrets
                  key: POSTGRES_PASSWORD
          command: ["/bin/sh", "-c"]
          args:
            - |
              until pg_isready -h postgres -p 5432 -U bvr -d bvr_nexus; do
                echo "Waiting for postgres..."
                sleep 3
              done
              echo "Postgres is ready."
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
      containers:
        - name: keycloak
          image: keycloak/keycloak:25.0.1
          imagePullPolicy: IfNotPresent
          command: ["start"]
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: KC_DB
              value: postgres
            - name: KC_DB_URL
              value: "jdbc:postgresql://postgres:5432/bvr_nexus"
            - name: KC_DB_USERNAME
              value: bvr
            - name: KC_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: bvr-nexus-secrets
                  key: POSTGRES_PASSWORD
            - name: KC_BOOTSTRAP_ADMIN_USERNAME
              value: admin
            - name: KC_BOOTSTRAP_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: bvr-nexus-secrets
                  key: KEYCLOAK_ADMIN_PASSWORD
            - name: KC_HTTP_ENABLED
              value: "true"
            - name: KC_HOSTNAME_STRICT
              value: "false"
            - name: KC_PROXY_HEADERS
              value: xforwarded
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 2Gi
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 15
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8080
            initialDelaySeconds: 90
            periodSeconds: 20
            failureThreshold: 5
---
apiVersion: v1
kind: Service
metadata:
  name: keycloak
  namespace: bvr-nexus
spec:
  selector:
    app: keycloak
  type: ClusterIP
  ports:
    - name: http
      port: 8080
      targetPort: 8080
