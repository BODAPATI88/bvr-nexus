# ArgoCD Ingress — deployed in the 'argocd' namespace (not bvr-nexus).
# Apply separately after ArgoCD is installed:
#   kubectl apply -f k8s/ingress-argocd.yaml
#
# Cloudflare Tunnel terminates TLS; Traefik routes plain HTTP to argocd-server.
# ArgoCD server must run with --insecure flag so it doesn't redirect to HTTPS.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ingress-argocd
  namespace: argocd
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  ingressClassName: traefik
  rules:
    - host: argo.bvrinfra.in
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: argocd-server
                port:
                  number: 80
