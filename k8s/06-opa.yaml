apiVersion: apps/v1
kind: Deployment
metadata:
  name: opa
  namespace: bvr-nexus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: opa
  template:
    metadata:
      labels:
        app: opa
    spec:
      containers:
        - name: opa
          image: openpolicyagent/opa:0.65.0
          args:
            - run
            - --server
            - --addr
            - :8181
            - --log-level
            - info
            - --ignore
            - ".*"
            - /policies
          ports:
            - containerPort: 8181
          volumeMounts:
            - name: policies
              mountPath: /policies
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 8181
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8181
            initialDelaySeconds: 15
            periodSeconds: 10
      volumes:
        - name: policies
          configMap:
            name: opa-policies
---
apiVersion: v1
kind: Service
metadata:
  name: opa
  namespace: bvr-nexus
spec:
  selector:
    app: opa
  ports:
    - port: 8181
      targetPort: 8181
