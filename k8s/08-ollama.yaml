apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
  namespace: bvr-nexus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ollama
  template:
    metadata:
      labels:
        app: ollama
    spec:
      containers:
        - name: ollama
          image: ollama/ollama:0.1.48
          args: ["serve"]
          ports:
            - containerPort: 11434
          volumeMounts:
            - name: data
              mountPath: /root/.ollama
          resources:
            requests:
              cpu: 500m
              memory: 2Gi
            limits:
              cpu: 2000m
              memory: 6Gi
          readinessProbe:
            tcpSocket:
              port: 11434
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 11434
            initialDelaySeconds: 30
            periodSeconds: 15
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: ollama-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: ollama
  namespace: bvr-nexus
spec:
  selector:
    app: ollama
  ports:
    - port: 11434
      targetPort: 11434
