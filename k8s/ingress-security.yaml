apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ingress-security
  namespace: bvr-nexus
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
    traefik.ingress.kubernetes.io/router.tls.certresolver: le
    # Note: vault.bvrinfra.in should be restricted to VPN/internal networks
    # via a network policy or Traefik IP allowlist middleware before exposing publicly.
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - keycloak.bvrinfra.in
        - vault.bvrinfra.in
        - kestra.bvrinfra.in
  rules:
    - host: keycloak.bvrinfra.in
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: keycloak
                port:
                  number: 8080
    - host: vault.bvrinfra.in
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: vault
                port:
                  number: 8200
    - host: kestra.bvrinfra.in
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: kestra
                port:
                  number: 8080
