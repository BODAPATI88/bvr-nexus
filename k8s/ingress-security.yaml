# Keycloak — SSO provider; handles its own authentication.
# Kestra — workflow UI; protected by Kestra's built-in credential system.
# Both require public access to function correctly.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ingress-auth-services
  namespace: bvr-nexus
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  ingressClassName: traefik
  rules:
    - host: keycloak.bvrinfra.in
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: keycloak
                port:
                  number: 8080
    - host: kestra.bvrinfra.in
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: kestra
                port:
                  number: 8080
---
# Vault — secrets management; restricted to internal/VPN networks only.
# Customize vault-ip-allowlist sourceRange in k8s/traefik-middlewares.yaml.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ingress-vault
  namespace: bvr-nexus
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
    traefik.ingress.kubernetes.io/router.middlewares: bvr-nexus-vault-ip-allowlist@kubernetescrd
spec:
  ingressClassName: traefik
  rules:
    - host: vault.bvrinfra.in
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: vault
                port:
                  number: 8200
