# Grafana — self-authenticating (GF_AUTH_ANONYMOUS_ENABLED=false).
# No extra middleware needed; Grafana enforces its own login.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ingress-grafana
  namespace: bvr-nexus
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  ingressClassName: traefik
  rules:
    - host: grafana.bvrinfra.in
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: grafana
                port:
                  number: 3000
---
# Prometheus, Loki, Jaeger — no built-in auth; protected by Traefik BasicAuth.
# Secret 'monitoring-auth-secret' created by k8s/create-secrets.sh.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ingress-telemetry
  namespace: bvr-nexus
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
    traefik.ingress.kubernetes.io/router.middlewares: bvr-nexus-monitoring-basic-auth@kubernetescrd
spec:
  ingressClassName: traefik
  rules:
    - host: prometheus.bvrinfra.in
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: prometheus
                port:
                  number: 9090
    - host: jaeger.bvrinfra.in
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: jaeger
                port:
                  number: 16686
    - host: loki.bvrinfra.in
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: loki
                port:
                  number: 3100
