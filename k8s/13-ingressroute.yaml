apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: bvr-nexus
  namespace: bvr-nexus
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
spec:
  ingressClassName: traefik
  rules:
    - host: bvr.bvrinfra.in
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: bvr-api
                port:
                  number: 8000
