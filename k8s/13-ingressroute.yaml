# Traefik IngressRoute — BVR Nexus public entry point
# bvr.bvrinfra.in → bvr-api:8000
# AI Gateway is internal only (http://ai-gateway:8000 inside the cluster)
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: bvr-nexus
  namespace: bvr-nexus
spec:
  entryPoints:
    - web
    - websecure
  routes:
    - match: Host(`bvr.bvrinfra.in`)
      kind: Rule
      services:
        - name: bvr-api
          port: 8000
