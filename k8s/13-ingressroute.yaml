# Traefik IngressRoute — BVR Nexus public entry point
# bvr.bvrinfra.in  →  bvr-api:8000  (all traffic)
# bvr.bvrinfra.in/ai/  →  ai-gateway:8000  (AI Gateway, prefix stripped)
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: bvr-nexus
  namespace: bvr-nexus
spec:
  entryPoints:
    - web
    - websecure
  routes:
    - match: Host(`bvr.bvrinfra.in`) && PathPrefix(`/ai`)
      kind: Rule
      middlewares:
        - name: strip-ai-prefix
      services:
        - name: ai-gateway
          port: 8000
    - match: Host(`bvr.bvrinfra.in`)
      kind: Rule
      services:
        - name: bvr-api
          port: 8000
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: strip-ai-prefix
  namespace: bvr-nexus
spec:
  stripPrefix:
    prefixes:
      - /ai
