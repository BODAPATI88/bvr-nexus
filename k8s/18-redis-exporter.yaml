apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-exporter
  namespace: bvr-nexus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis-exporter
  template:
    metadata:
      labels:
        app: redis-exporter
    spec:
      containers:
        - name: redis-exporter
          image: oliver006/redis_exporter:v1.62.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: metrics
              containerPort: 9121
          env:
            - name: REDIS_ADDR
              value: "redis://redis:6379"
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: bvr-nexus-secrets
                  key: REDIS_PASSWORD
                  optional: true
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 9121
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 9121
            initialDelaySeconds: 15
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: redis-exporter
  namespace: bvr-nexus
spec:
  selector:
    app: redis-exporter
  type: ClusterIP
  ports:
    - name: metrics
      port: 9121
      targetPort: 9121
