apiVersion: apps/v1
kind: Deployment
metadata:
  name: public-site
  namespace: bvr-nexus
  labels:
    app: public-site
    tier: web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: public-site
  template:
    metadata:
      labels:
        app: public-site
    spec:
      containers:
        - name: public-site
          image: docker.io/bvr-nexus/public-site:3.0.0
          imagePullPolicy: Never
          ports:
            - containerPort: 8000
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "250m"
              memory: "128Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: public-site
  namespace: bvr-nexus
spec:
  selector:
    app: public-site
  ports:
    - name: http
      port: 8003
      targetPort: 8000
  type: ClusterIP
