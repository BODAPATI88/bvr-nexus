# BVR NEXUS v2 — Development Overrides
# Auto-applied by Docker Compose when present alongside docker-compose.yml.
# Run dev stack:  docker compose up
# Run prod stack: docker compose -f docker-compose.yml up -d

services:
  # Expose PostgreSQL for local tooling (psql, DBeaver, etc.)
  postgres:
    ports:
      - "5432:5432"

  # Expose MinIO console for bucket inspection
  minio:
    ports:
      - "9001:9001"

  # Dev: make the artifacts bucket public so objects are readable without signing
  minio-init:
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-bvradmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-changeme}
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD;
      mc mb local/bvr-artifacts --ignore-existing;
      mc mb local/bvr-logs --ignore-existing;
      mc policy set public local/bvr-artifacts;
      echo 'MinIO initialized (dev mode: public bucket).'
      "

  # Dev: disable Kestra basic-auth and expose UI port directly
  kestra:
    ports:
      - "8080:8080"
    environment:
      KESTRA_CONFIGURATION: |
        datasources:
          postgres:
            url: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-bvr_nexus}
            driverClassName: org.postgresql.Driver
            username: ${POSTGRES_USER:-bvr}
            password: ${POSTGRES_PASSWORD:-changeme}
        flyway:
          datasources:
            postgres:
              baseline-on-migrate: true
        kestra:
          repository:
            type: postgres
          queue:
            type: postgres
          storage:
            type: minio
            minio:
              endpoint: minio
              port: 9000
              secure: false
              accessKey: ${MINIO_ROOT_USER:-bvradmin}
              secretKey: ${MINIO_ROOT_PASSWORD:-changeme}
              bucket: bvr-artifacts
              region: us-east-1
          url: http://localhost:8080/
          server:
            basic-auth:
              enabled: false

  # Dev: use the Vault dev-mode token instead of a real Vault token
  bvr-api:
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-bvr}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-bvr_nexus}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-changeme}
      VAULT_TOKEN: ${VAULT_DEV_ROOT_TOKEN_ID:-bvr-root-token}
      BVR_SERVICE_TOKEN: ${BVR_SERVICE_TOKEN:-bvr-service-token}

  ai-gateway:
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-bvr}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-bvr_nexus}

  bvr-workers:
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-bvr}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-bvr_nexus}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-changeme}

  # Dev: Vault in dev mode — auto-initialised, auto-unsealed, in-memory storage
  vault:
    command: server -dev
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: ${VAULT_DEV_ROOT_TOKEN_ID:-bvr-root-token}
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    ports:
      - "8200:8200"

  # Dev: Keycloak start-dev skips TLS and hostname checks
  keycloak:
    command: start-dev
    ports:
      - "8081:8080"

  # Dev: Grafana with a known password and exposed port
  grafana:
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GF_ADMIN_PASSWORD:-admin}
    ports:
      - "3000:3000"

  # Dev: expose all observability UIs for local browser access
  prometheus:
    ports:
      - "9090:9090"

  jaeger:
    ports:
      - "16686:16686"
      - "4317:4317"

  loki:
    ports:
      - "3100:3100"

  ollama:
    ports:
      - "11434:11434"

  # Dev: insecure dashboard on :8082 + dev routing config
  traefik:
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--ping=true"
    environment:
      DOCKER_API_VERSION: "1.41"
    ports:
      - "8082:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./gateway/traefik.yml:/etc/traefik/traefik.yml:ro
