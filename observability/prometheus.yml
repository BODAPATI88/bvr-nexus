global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Kestra management port (Micronaut) exposes Prometheus on :8081/prometheus
  - job_name: 'kestra'
    static_configs:
      - targets: ['kestra:8081']
    metrics_path: '/prometheus'

  - job_name: 'bvr-api'
    static_configs:
      - targets: ['bvr-api:8000']
    metrics_path: '/metrics'

  - job_name: 'ai-gateway'
    static_configs:
      - targets: ['ai-gateway:8000']
    metrics_path: '/metrics'

  - job_name: 'redis-exporter'
    static_configs:
      - targets: ['redis-exporter:9121']
    metrics_path: '/metrics'

  - job_name: 'opa'
    static_configs:
      - targets: ['opa:8181']
    metrics_path: '/metrics'
