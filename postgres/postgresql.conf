# BVR Nexus — PostgreSQL tuning (M1 audit remediation)
# Target: pgvector/pgvector:pg16 container with 1 GB RAM limit

# ── Connection ──────────────────────────────────────────────────────────────
listen_addresses = '*'                 # accept connections from all containers
max_connections = 100                  # API pool max_size=10, workers + Kestra

# ── Memory ──────────────────────────────────────────────────────────────────
shared_buffers = 256MB                 # 25% of 1 GB container limit
effective_cache_size = 768MB           # 75% of RAM — planner hint only
work_mem = 4MB                         # per sort/hash; 100 conns × 4 MB = 400 MB peak
maintenance_work_mem = 64MB            # VACUUM, CREATE INDEX

# ── Write performance ────────────────────────────────────────────────────────
wal_buffers = 16MB
checkpoint_completion_target = 0.9
checkpoint_timeout = 10min
max_wal_size = 1GB
min_wal_size = 80MB

# ── Query planner ────────────────────────────────────────────────────────────
random_page_cost = 1.1                 # SSD — reduce sequential vs random cost bias
effective_io_concurrency = 200         # SSD parallel I/O
default_statistics_target = 100

# ── Parallel workers ─────────────────────────────────────────────────────────
max_worker_processes = 4
max_parallel_workers_per_gather = 2
max_parallel_workers = 4
max_parallel_maintenance_workers = 2

# ── Logging (structured, no excessive noise) ─────────────────────────────────
log_destination = 'stderr'
logging_collector = off
log_min_duration_statement = 1000      # log queries slower than 1 s
log_line_prefix = '%t [%p] %u@%d '
log_lock_waits = on
log_temp_files = 0

# ── Autovacuum ───────────────────────────────────────────────────────────────
autovacuum = on
autovacuum_max_workers = 3
autovacuum_naptime = 1min
autovacuum_vacuum_cost_delay = 2ms

# ── Connection keep-alive (matches asyncpg pool settings) ────────────────────
tcp_keepalives_idle = 300
tcp_keepalives_interval = 10
tcp_keepalives_count = 5
