id: gpt
name: OpenAI GPT
version: 2.0.0
type: ai
author: BVR Group
description: |
  OpenAI GPT integration for reasoning, code analysis,
  and creative tasks. Supports GPT-4o.

capabilities:
  - code_analysis
  - reasoning
  - creative_writing
  - document_review

dependencies:
  - httpx>=0.27.0

config:
  api_key: "${OPENAI_API_KEY}"
  model: "gpt-4o"
  max_tokens: 4000
  temperature: 0.7

permissions:
  - name: api_key
    description: "OpenAI API key for authentication"
    required: true
    secret: true
