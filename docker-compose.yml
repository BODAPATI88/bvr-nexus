# BVR NEXUS v2 — Production Base Configuration
# For development: docker compose up          (auto-applies docker-compose.override.yml)
# For production:  docker compose -f docker-compose.yml up -d

services:
  # ───────────────────────────────────────────
  # L4. DATA & STATE LAYER
  # ───────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: bvr-postgres
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-bvr}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-bvr_nexus}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./api/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - ./postgres/postgresql.conf:/etc/postgresql/postgresql.conf:ro
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bvr} -d ${POSTGRES_DB:-bvr_nexus}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M
    networks:
      - bvr-network

  redis:
    image: redis:7.2.4-alpine
    container_name: bvr-redis
    env_file:
      - .env
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 128M
    networks:
      - bvr-network

  minio:
    image: minio/minio:latest
    container_name: bvr-minio
    command: server /data --console-address ":9001"
    env_file:
      - .env
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-bvradmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      # SSE-S3 encryption at rest (H8). Format: <key-name>:<base64-32-byte-key>
      MINIO_KMS_SECRET_KEY: ${MINIO_KMS_SECRET_KEY}
    ports:
      - "9000:9000"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 128M
    networks:
      - bvr-network

  redis-exporter:
    image: oliver006/redis_exporter:latest
    container_name: bvr-redis-exporter
    environment:
      REDIS_ADDR: redis://redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    depends_on:
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '0.1'
          memory: 64M
        reservations:
          cpus: '0.05'
          memory: 32M
    networks:
      - bvr-network

  minio-init:
    image: minio/mc:latest
    container_name: bvr-minio-init
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-bvradmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD;
      mc mb local/bvr-artifacts --ignore-existing;
      mc mb local/bvr-logs --ignore-existing;
      mc encrypt set sse-s3 local/bvr-artifacts;
      mc encrypt set sse-s3 local/bvr-logs;
      echo 'MinIO initialized with SSE-S3 encryption.'
      "
    networks:
      - bvr-network

  # ───────────────────────────────────────────
  # L1. ORCHESTRATION LAYER (Kestra)
  # ───────────────────────────────────────────
  kestra:
    image: kestra/kestra:v0.18.0
    container_name: bvr-kestra
    pull_policy: missing
    user: "root"
    command: server standalone
    env_file:
      - .env
    environment:
      KESTRA_CONFIGURATION: |
        datasources:
          postgres:
            url: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-bvr_nexus}
            driverClassName: org.postgresql.Driver
            username: ${POSTGRES_USER:-bvr}
            password: ${POSTGRES_PASSWORD}
        flyway:
          datasources:
            postgres:
              baseline-on-migrate: true
        kestra:
          repository:
            type: postgres
          queue:
            type: postgres
          storage:
            type: minio
            minio:
              endpoint: minio
              port: 9000
              secure: false
              accessKey: ${MINIO_ROOT_USER:-bvradmin}
              secretKey: ${MINIO_ROOT_PASSWORD}
              bucket: bvr-artifacts
              region: us-east-1
          url: http://localhost:8080/
          server:
            basic-auth:
              enabled: true
              username: ${KESTRA_ADMIN_USERNAME}
              password: ${KESTRA_ADMIN_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    volumes:
      - kestra_data:/app/storage
      - ./kestra-workflows:/local-flows:ro
    networks:
      - bvr-network

  # ───────────────────────────────────────────
  # L0/L1. FASTAPI GATEWAY (BVR Application Layer)
  # ───────────────────────────────────────────
  bvr-api:
    build:
      context: .
      dockerfile: api/Dockerfile
      network: host
    container_name: bvr-api
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-bvr}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-bvr_nexus}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-bvradmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      OPA_URL: http://opa:8181
      VAULT_URL: http://vault:8200
      VAULT_TOKEN: ${VAULT_TOKEN}
      KESTRA_URL: http://kestra:8080
      AI_GATEWAY_URL: http://ai-gateway:8000
      BVR_SERVICE_TOKEN: ${BVR_SERVICE_TOKEN}
      API_ALLOWED_ORIGINS: ${API_ALLOWED_ORIGINS:-http://localhost:3000}
    ports:
      - "8000:8000"
    volumes:
      - ./contracts:/app/contracts:ro
      - ./plugins:/app/plugins:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      opa:
        condition: service_started
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M
    networks:
      - bvr-network

  # ───────────────────────────────────────────
  # AI GATEWAY (BVR-Specific)
  # ───────────────────────────────────────────
  ai-gateway:
    build:
      context: .
      dockerfile: ai-gateway/Dockerfile
      network: host
    container_name: bvr-ai-gateway
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      KIMI_API_KEY: ${KIMI_API_KEY:-}
      OLLAMA_URL: http://ollama:11434
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-bvr}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-bvr_nexus}
      BVR_CONSTITUTION: /app/contracts/constitution.yaml
      BVR_PLUGINS_DIR: /app/plugins
    ports:
      - "8001:8000"
    volumes:
      - ./contracts:/app/contracts:ro
      - ./plugins:/app/plugins:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M
    networks:
      - bvr-network

  # ───────────────────────────────────────────
  # BVR WORKERS (Business Logic)
  # ───────────────────────────────────────────
  bvr-workers:
    build:
      context: .
      dockerfile: workers/Dockerfile
      network: host
    container_name: bvr-workers
    environment:
      BVR_API_URL: http://bvr-api:8000
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-bvr}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-bvr_nexus}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-bvradmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      AI_GATEWAY_URL: http://ai-gateway:8000
      OPA_URL: http://opa:8181
      BVR_CONSTITUTION: /app/contracts/constitution.yaml
      BVR_PLUGINS_DIR: /app/plugins
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-}
      SSL_CERT_FILE: /app/proxy-ca.crt
      REQUESTS_CA_BUNDLE: /app/proxy-ca.crt
    volumes:
      - ./plugins:/app/plugins:ro
      - ./contracts:/app/contracts:ro
    depends_on:
      bvr-api:
        condition: service_healthy
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      ai-gateway:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    networks:
      - bvr-network

  # ───────────────────────────────────────────
  # L3. AI / LLM (Local + Gateway)
  # ───────────────────────────────────────────
  ollama:
    image: ollama/ollama:0.1.48
    container_name: bvr-ollama
    volumes:
      - ollama_data:/root/.ollama
    command: serve
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/localhost/11434 2>/dev/null' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 8G
        reservations:
          cpus: '0.5'
          memory: 1G
    networks:
      - bvr-network

  # ───────────────────────────────────────────
  # L5. GOVERNANCE LAYER
  # ───────────────────────────────────────────
  opa:
    image: openpolicyagent/opa:0.65.0
    container_name: bvr-opa
    command: run --server --addr :8181 --log-level info /policies
    volumes:
      - ./governance/rego:/policies:ro
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.05'
          memory: 64M
    networks:
      - bvr-network

  vault:
    image: hashicorp/vault:1.17.0
    container_name: bvr-vault
    cap_add:
      - IPC_LOCK
    environment:
      VAULT_ADDR: http://0.0.0.0:8200
    command: server -config=/vault/user-config/vault.hcl
    volumes:
      - ./vault/config:/vault/user-config:ro
      - vault_data:/vault/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8200/v1/sys/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.05'
          memory: 64M
    networks:
      - bvr-network

  keycloak:
    image: keycloak/keycloak:25.0.1
    container_name: bvr-keycloak
    command: start
    env_file:
      - .env
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-bvr_nexus}
      KC_DB_USERNAME: ${POSTGRES_USER:-bvr}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD}
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME_STRICT: "false"
      KC_PROXY_HEADERS: xforwarded
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "grep -q ':1F90 ' /proc/net/tcp 2>/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - bvr-network

  # ───────────────────────────────────────────
  # L6. OBSERVABILITY LAYER
  # ───────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: bvr-prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9090/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 128M
    networks:
      - bvr-network

  grafana:
    image: grafana/grafana:11.0.0
    container_name: bvr-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GF_ADMIN_PASSWORD}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./observability/dashboards:/etc/grafana/provisioning/dashboards:ro
    depends_on:
      - prometheus
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 128M
    networks:
      - bvr-network

  jaeger:
    image: jaegertracing/all-in-one:1.58.0
    container_name: bvr-jaeger
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:14269/"]
      interval: 15s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 128M
    networks:
      - bvr-network

  loki:
    image: grafana/loki:3.0.0
    container_name: bvr-loki
    volumes:
      - ./observability/loki-config.yml:/etc/loki/local-config.yaml:ro
    command: -config.file=/etc/loki/local-config.yaml
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3100/ready"]
      interval: 15s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 128M
    networks:
      - bvr-network

  # ───────────────────────────────────────────
  # L0. INGRESS (Traefik)
  # ───────────────────────────────────────────
  traefik:
    image: traefik:v3.1.0
    container_name: bvr-traefik
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.file.filename=/etc/traefik/traefik.yml"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.traefik.address=:8080"
      - "--api.dashboard=true"
      - "--ping=true"
      - "--ping.entrypoint=traefik"
    ports:
      - "80:80"
      - "443:443"
      - "8082:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./gateway/traefik.prod.yml:/etc/traefik/traefik.yml:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/ping"]
      interval: 15s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.05'
          memory: 64M
    networks:
      - bvr-network

volumes:
  postgres_data:
  redis_data:
  minio_data:
  kestra_data:
  ollama_data:
  vault_data:
  prometheus_data:
  grafana_data:

networks:
  bvr-network:
    driver: bridge
