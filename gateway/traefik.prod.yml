# Traefik v3 static configuration (file provider)
# Mounted at /etc/traefik/traefik.yml inside the container.
#
# C4 remediation: TLS enabled on :443 with HTTP→HTTPS permanent redirect on :80.
# Traefik generates a self-signed cert automatically when no explicit cert is
# provided — replace tls:{} with a certResolver block for ACME in production.

entryPoints:
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
          permanent: true
  websecure:
    address: ":443"
    http:
      tls: {}
  traefik:
    address: ":8080"

api:
  dashboard: true
  insecure: false

providers:
  docker:
    exposedByDefault: false
    network: bvr-network

http:
  routers:
    kestra:
      rule: "Host(`kestra.localhost`)"
      service: kestra
      entryPoints:
        - websecure
      tls: {}

    bvr-api:
      rule: "Host(`api.localhost`)"
      service: bvr-api
      entryPoints:
        - websecure
      middlewares:
        - rate-limit
      tls: {}

    grafana:
      rule: "Host(`grafana.localhost`)"
      service: grafana
      entryPoints:
        - websecure
      tls: {}

    # Dashboard accessible at http://localhost:8082/dashboard/ with BasicAuth.
    # TRAEFIK_DASHBOARD_USERS format: htpasswd -nb admin pass | sed 's/\$/\$\$/g'
    traefik-dashboard:
      rule: "PathPrefix(`/dashboard`) || PathPrefix(`/api`)"
      service: api@internal
      entryPoints:
        - traefik
      middlewares:
        - dashboard-auth

  services:
    kestra:
      loadBalancer:
        servers:
          - url: "http://kestra:8080"

    bvr-api:
      loadBalancer:
        servers:
          - url: "http://bvr-api:8000"

    grafana:
      loadBalancer:
        servers:
          - url: "http://grafana:3000"

  middlewares:
    rate-limit:
      rateLimit:
        average: 100
        burst: 50

    dashboard-auth:
      basicAuth:
        users:
          - "${TRAEFIK_DASHBOARD_USERS}"
