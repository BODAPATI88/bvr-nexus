entryPoints:
  web:
    address: ":80"
  websecure:
    address: ":443"
  traefik:
    address: ":8080"

api:
  dashboard: true
  insecure: false

providers:
  docker:
    exposedByDefault: false
    network: bvr-network

http:
  routers:
    kestra:
      rule: "Host(`kestra.localhost`)"
      service: kestra
      entryPoints:
        - web

    bvr-api:
      rule: "Host(`api.localhost`)"
      service: bvr-api
      entryPoints:
        - web
      middlewares:
        - rate-limit

    grafana:
      rule: "Host(`grafana.localhost`)"
      service: grafana
      entryPoints:
        - web

    # Dashboard accessible at http://localhost:8082/dashboard/ with BasicAuth.
    # TRAEFIK_DASHBOARD_USERS format: htpasswd -nb admin pass | sed 's/\$/\$\$/g'
    traefik-dashboard:
      rule: "PathPrefix(`/dashboard`) || PathPrefix(`/api`)"
      service: api@internal
      entryPoints:
        - traefik
      middlewares:
        - dashboard-auth

  services:
    kestra:
      loadBalancer:
        servers:
          - url: "http://kestra:8080"

    bvr-api:
      loadBalancer:
        servers:
          - url: "http://bvr-api:8000"

    grafana:
      loadBalancer:
        servers:
          - url: "http://grafana:3000"

  middlewares:
    rate-limit:
      rateLimit:
        average: 100
        burst: 50

    dashboard-auth:
      basicAuth:
        users:
          - "${TRAEFIK_DASHBOARD_USERS}"
