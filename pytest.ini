[pytest]
asyncio_mode = auto
pythonpath = .
testpaths = tests
addopts = --ignore=tests/integration
env =
    OTEL_ENABLED=false
    REDIS_URL=redis://localhost:6379
    DATABASE_URL=postgresql+asyncpg://bvr:test@localhost:5432/bvr_nexus
    BVR_API_URL=http://localhost:8000
    BVR_CONSTITUTION=contracts/constitution.yaml
    BVR_PLUGINS_DIR=plugins
